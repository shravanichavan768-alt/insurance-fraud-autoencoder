<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FraudGuard AI — Insurance Fraud Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="portal">

    <!-- Top Navbar -->
    <div class="navbar">
        <div class="nav-logo">🛡️ FraudGuard AI</div>
        <div class="nav-stats">
            <span> Autoencoder</span>
            <span> Isolation Forest</span>
            <span> XGBoost</span>
            <span class="nav-accuracy">96.1% Accuracy</span>
        </div>
    </div>

    <div class="main">

        <!-- Form Card -->
        <div class="form-card">
            <h3> New Claim Assessment</h3>
            <p class="form-sub">Fill in the claim details. Our AI will automatically analyze fraud risk.</p>

            <div class="form-grid">
                <div class="form-group full">
                    <label>Patient Full Name</label>
                    <input type="text" id="patient_name" placeholder="e.g. Rajesh Sharma">
                </div>
                <div class="form-group">
                    <label>Patient Age</label>
                    <input type="number" id="patient_age" placeholder="e.g. 45">
                </div>
                <div class="form-group">
                    <label>Policy Number</label>
                    <input type="text" id="policy_number" placeholder="e.g. LIC-2024-789">
                </div>
                <div class="form-group full">
                    <label>Hospital Name</label>
                    <input type="text" id="hospital_name" placeholder="e.g. Apollo Hospital, Mumbai">
                </div>
                <div class="form-group full">
                    <label>Primary Diagnosis</label>
                    <input type="text" id="diagnosis" placeholder="e.g. Knee Replacement Surgery">
                </div>
                <div class="form-group">
                    <label>Claim Amount (₹)</label>
                    <input type="number" id="claim_amount" placeholder="e.g. 450000">
                </div>
                <div class="form-group">
                    <label>Days Hospitalized</label>
                    <input type="number" id="hospital_stay_days" placeholder="e.g. 5">
                </div>
                <div class="form-group">
                    <label>Treatment Date</label>
                    <input type="date" id="treatment_date">
                </div>
            </div>

            <div class="sample-btns">
                <button class="sample-btn legit-btn" onclick="fillSample('legit')">
                    Fill Sample Legitimate Claim
                </button>
                <button class="sample-btn fraud-btn" onclick="fillSample('fraud')">
                     Fill Sample Fraud Claim
                </button>
            </div>

            <button class="predict-btn" onclick="predict()">
                 Analyze Claim for Fraud
            </button>
        </div>

        <!-- Result -->
        <div id="result"></div>

        <!-- Claims Log -->
        <div class="log-card" id="log-card" style="display:none">
            <h3> Recent Claims Log</h3>
            <table class="log-table">
                <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Hospital</th>
                        <th>Amount (₹)</th>
                        <th>Risk Score</th>
                        <th>Verdict</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="log-body"></tbody>
            </table>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
